<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f1117"/>

  <!-- Candlestick 1: bearish (red), left -->
  <line x1="7" y1="5" x2="7" y2="9"   stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="4.5" y="9" width="5" height="8" rx="0.5" fill="#ef4444"/>
  <line x1="7" y1="17" x2="7" y2="22" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Candlestick 2: bullish (green), center -->
  <line x1="16" y1="4"  x2="16" y2="8"  stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="13.5" y="8" width="5" height="10" rx="0.5" fill="#22c55e"/>
  <line x1="16" y1="18" x2="16" y2="24" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Candlestick 3: bearish (red), right -->
  <line x1="25" y1="7"  x2="25" y2="11" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="22.5" y="11" width="5" height="7" rx="0.5" fill="#ef4444"/>
  <line x1="25" y1="18" x2="25" y2="23" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
</svg>
